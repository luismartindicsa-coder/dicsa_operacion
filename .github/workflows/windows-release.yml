name: Windows Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    env:
      UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/version.json
      DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/latest/download/DicsaOperacionSetup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read app version
        shell: pwsh
        run: |
          $match = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          if (-not $match) {
            throw "No se encontro la version en pubspec.yaml"
          }

          $version = $match.Matches[0].Groups[1].Value.Trim()
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows app
        run: >
          flutter build windows --release
          --dart-define=DICSA_UPDATE_MANIFEST_URL=${{ env.UPDATE_MANIFEST_URL }}

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/dicsa_operacion.iss
          options: >-
            /DMyAppVersion=${{ env.APP_VERSION }}
            /DFlutterBuildDir=${{ github.workspace }}\build\windows\x64\runner\Release

      - name: Create update manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\installer | Out-Null
          $publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = @{
            version = "${{ env.APP_VERSION }}"
            notes = "Consulta las notas del release en GitHub."
            windows_url = "${{ env.DOWNLOAD_URL }}"
            published_at = $publishedAt
          } | ConvertTo-Json

          Set-Content -Path build\installer\version.json -Value $manifest -Encoding utf8

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Windows ${{ env.APP_VERSION }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            build/installer/DicsaOperacionSetup.exe
            build/installer/version.json
