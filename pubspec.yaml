name: dicsa_operacion
description: "Sistema operativo Dicsa"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  path_drawing: ^1.0.1
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_dicsa.jpg
    - assets/images/logo_dicsa.svg
    - assets/images/logo_dicsa.png
