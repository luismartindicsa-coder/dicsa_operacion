name: dicsa_operacion
description: "Sistema operativo Dicsa"
publish_to: "none"

version: 1.0.10+12

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  file_picker: ^10.3.3
  http: ^1.4.0
  package_info_plus: ^8.3.0
  pdf: ^3.11.3
  path_drawing: ^1.0.1
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_dicsa.png
  web:
    generate: true
    image_path: assets/images/logo_dicsa.png
  macos:
    generate: true
    image_path: assets/images/logo_dicsa.png
  windows:
    generate: true
    image_path: assets/images/logo_dicsa.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_dicsa.jpg
    - assets/images/logo_dicsa.svg
    - assets/images/logo_dicsa.png
